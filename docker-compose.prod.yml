services:

  db:
    restart: always

  minio:
    restart: always
    ports: []   # Do not expose MinIO ports publicly in production

  api:
    build: ./backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    env_file: .env
    restart: always
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: ./backend
    command: python manage.py qcluster
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    env_file: .env
    restart: always
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: always
